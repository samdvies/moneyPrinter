[mypy]
python_version = 3.12
strict = True
warn_unused_configs = True
disallow_untyped_defs = True
no_implicit_optional = True
plugins = pydantic.mypy
mypy_path = services/common/src,services/ingestion/src,services/simulator/src,services/strategy_registry/src,services/risk_manager/src,services/dashboard/src,services/research_orchestrator/src,services/backtest_engine/src
explicit_package_bases = True

[mypy-services.common.tests.*]
disallow_untyped_defs = False

[mypy-services.ingestion.tests.*]
disallow_untyped_defs = False

[mypy-services.simulator.tests.*]
disallow_untyped_defs = False

[mypy-services.strategy_registry.tests.*]
disallow_untyped_defs = False

[mypy-services.risk_manager.tests.*]
disallow_untyped_defs = False

[mypy-services.dashboard.tests.*]
disallow_untyped_defs = False

[mypy-services.research_orchestrator.tests.*]
disallow_untyped_defs = False

[mypy-services.backtest_engine.tests.*]
disallow_untyped_defs = False

[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-betfairlightweight.*]
ignore_missing_imports = True
