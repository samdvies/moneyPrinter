name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: execution -> target
          key: execution-${{ hashFiles('execution/Cargo.lock', 'execution/rust-toolchain.toml') }}
      - name: cargo fmt
        working-directory: execution
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: execution
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        working-directory: execution
        run: cargo test --workspace

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv sync
      - run: uv run mypy services

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: algobet
          POSTGRES_USER: algobet
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U algobet"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: algobet
      POSTGRES_USER: algobet
      POSTGRES_PASSWORD: devpassword
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      SERVICE_NAME: ci-test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv sync
      - run: uv run pytest -v

  smoke:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: algobet
          POSTGRES_USER: algobet
          POSTGRES_PASSWORD: devpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U algobet"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: algobet
      POSTGRES_USER: algobet
      POSTGRES_PASSWORD: devpassword
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      SERVICE_NAME: ci-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv sync
      - run: uv run python -m scripts.smoke
