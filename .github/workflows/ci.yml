name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: execution -> target
          key: execution-${{ hashFiles('execution/Cargo.lock', 'execution/rust-toolchain.toml') }}
      - name: cargo fmt
        working-directory: execution
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: execution
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        working-directory: execution
        run: cargo test --workspace
      - name: schema parity
        run: uv run python scripts/check_schema_parity.py
      - name: start redis for integration test
        run: docker compose up -d redis
      - name: execution redis integration
        run: cargo test -p execution-bin --test integration_redis -- --ignored
        working-directory: execution
      - name: stop redis integration stack
        if: always()
        run: docker compose down

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv sync
      - run: uv run mypy services

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: algobet
          POSTGRES_USER: algobet
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U algobet"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: algobet
      POSTGRES_USER: algobet
      POSTGRES_PASSWORD: devpassword
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      SERVICE_NAME: ci-test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv sync
      - run: uv run pytest -v
      - name: validation framework smoke (polymarket-yes-mean-revert synthetic)
        run: |
          set -euo pipefail
          uv run python -m backtest_engine.validate --strategy polymarket-yes-mean-revert --synthetic
          REPORT_JSON=$(ls -t artifacts/backtests/polymarket-yes-mean-revert/*/report.json | head -1)
          set +e
          GATE_OUT=$(uv run python -m backtest_engine.promotion_gate --report "$REPORT_JSON")
          GATE_RC=$?
          set -e
          echo "$GATE_OUT"
          # Expected outcome: FAIL (exit 1) on the seed strategy per plan.
          # CI fails if gate crashed (any rc other than 0 or 1) or did not print PASS/FAIL.
          if [ "$GATE_RC" -ne 0 ] && [ "$GATE_RC" -ne 1 ]; then
            echo "promotion_gate crashed with rc=$GATE_RC" >&2
            exit 1
          fi
          if ! echo "$GATE_OUT" | grep -qE '^(PASS|FAIL)$'; then
            echo "promotion_gate did not emit PASS/FAIL line" >&2
            exit 1
          fi

  smoke:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: algobet
          POSTGRES_USER: algobet
          POSTGRES_PASSWORD: devpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U algobet"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: algobet
      POSTGRES_USER: algobet
      POSTGRES_PASSWORD: devpassword
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      SERVICE_NAME: ci-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv sync
      - run: uv run python -m scripts.smoke
