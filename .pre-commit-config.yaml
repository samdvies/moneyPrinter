exclude: '^services/research_orchestrator/tests/fixtures/(validator_allowed|validator_rejected|adversarial_modules)/'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.9
          - pydantic-settings>=2.6
          - redis>=7.0
          - asyncpg>=0.30
          - pytest>=8.3
          - pytest-asyncio>=0.24
          - argon2-cffi>=23.1
          - fastapi>=0.115
          - httpx>=0.27
          - email-validator>=2.2
        files: ^services/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
