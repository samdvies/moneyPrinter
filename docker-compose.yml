services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-algobet}
      POSTGRES_USER: ${POSTGRES_USER:-algobet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algobet}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  execution:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["execution-bin"]
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      VENUE: mock
      EXECUTION_CONSUMER_NAME: execution-mock-1
      MAX_TRACKED_ORDERS: 10000
      SHUTDOWN_DRAIN_SECONDS: 30
    depends_on:
      redis:
        condition: service_healthy

  # Uncomment to run the simulator as a managed container:
  # simulator:
  #   build:
  #     context: .
  #     dockerfile: services/simulator/Dockerfile
  #   environment:
  #     SERVICE_NAME: simulator
  #     REDIS_HOST: redis
  #     POSTGRES_HOST: postgres
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  pgdata:
  redisdata:
